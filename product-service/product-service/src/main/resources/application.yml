server:
  port: 8082
  servlet:
    context-path: ""

spring:
  application:
    name: product-service

  datasource:
    url: jdbc:mysql://mysql:3306/product_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:hmak19991201***}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

    listener:
      simple:
        acknowledge-mode: auto   # Spring auto-acks on success, nacks on exception
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3
          multiplier: 2

# Eureka
