server:
  port: 8083


spring:
  application:
    name: order-service

  datasource:
    url: jdbc:mysql://mysql:3306/new_order_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:hmak19991201***}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:avishkakkoswaththa@gmail.com}
    password: ${MAIL_PASSWORD:npwerdgeglezoqsn}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}

  frontend-url: ${FRONTEND_URL:http://frontend:3000}

  rabbitmq:
    # Exchanges
    order-exchange: order.exchange
    product-exchange: product.exchange
    payment-exchange: payment.exchange

    # Order routing keys (published BY this service)
    routing-keys:
      order-placed:     order.placed
      order-confirmed:  order.confirmed
      order-cancelled:  order.cancelled
      order-completed:  order.completed
      refund-requested: refund.requested
      payment-success: payment.success
      payment-failed: payment.failed

    # Queues this service OWNS
    queues:
      order-placed:     order.placed.queue
      order-confirmed:  order.confirmed.queue
      order-cancelled:  order.cancelled.queue
      order-completed:  order.completed.queue
      refund-requested: refund.requested.queue
      # Queues this service CONSUMES from product-service
      inventory-updated: inventory.updated.queue
      low-stock-alert:   inventory.low-stock.queue
      product-deleted:   product.deleted.queue

      payment-success: payment.success.queue
      payment-failed: payment.failed.queue

  order:
    free-shipping-threshold: 100.00   # free shipping above this amount
    flat-shipping-fee: 5.99
    cancellation-window-minutes: 30    # user can cancel within 30 min of placing
    payment-timeout-minutes: 15        # order expires if payment-service does not confirm within 15 min

services:
  user-service-url:    ${USER_SERVICE_URL:http://user-service}
  product-service-url: ${PRODUCT_SERVICE_URL:http://product-service}

logging:
  level:
    com.microservice.orderservice: DEBUG
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
