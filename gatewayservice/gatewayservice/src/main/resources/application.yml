server:
  port: 8079

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      routes:

        # ================= USER SERVICE =================
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/auth/**, /admin/users, /users/me, /users/me/password

        # ================= PRODUCT SERVICE =================
        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/products/**, /categories/**, /reviews/**, /reviews/pending, /files/upload

        # ================= ORDER SERVICE =================
        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/orders, /orders/**, /admin/orders, /admin/refunds/**,/refunds/**, /admin/orders/**
          filters:
            - StripPrefix=0

        # ================= PAYMENT SERVICE =================
        - id: payment-service
          uri: http://payment-service:8084
#          predicates:
#            - Path=/payments/**, /refunds/**, /payments/initiate, /admin/payments/refunds, /admin/payments/refund, /admin/payments/refund/**
          predicates:
            - Path=/payments/**,
              /refunds/**,
              /payments/initiate,
              /admin/payments/**
          filters:
            - StripPrefix=0

